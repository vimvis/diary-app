<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘의 기억</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f1e8;
      --bg2: #ece5d9;
      --surface: rgba(255, 252, 246, 0.92);
      --surface-strong: #fffaf2;
      --surface2: #f2eadc;
      --border: rgba(71, 53, 30, 0.12);
      --text: #241c15;
      --text2: #6b5d4c;
      --text3: #a3947f;
      --primary: #c96f3b;
      --primary-soft: rgba(201, 111, 59, 0.12);
      --primary-glow: rgba(201, 111, 59, 0.24);
      --accent: #5d8b72;
      --accent-soft: rgba(93, 139, 114, 0.12);
      --danger: #d9534f;
      --danger-soft: rgba(217, 83, 79, 0.1);
      --shadow: 0 18px 40px rgba(62, 42, 19, 0.08);
      --shadow-lg: 0 22px 50px rgba(62, 42, 19, 0.14);
      --radius: 22px;
      --radius-sm: 14px;
      --header-h: 68px;
      --nav-h: 76px;
      --transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="dark"] {
      --bg: #121317;
      --bg2: #181a20;
      --surface: rgba(28, 30, 37, 0.92);
      --surface-strong: #20232b;
      --surface2: #262933;
      --border: rgba(255, 255, 255, 0.08);
      --text: #f5f1eb;
      --text2: #b4a798;
      --text3: #6e655d;
      --primary: #f08d49;
      --primary-soft: rgba(240, 141, 73, 0.12);
      --primary-glow: rgba(240, 141, 73, 0.26);
      --accent: #7dc49d;
      --accent-soft: rgba(125, 196, 157, 0.13);
      --danger: #f07167;
      --danger-soft: rgba(240, 113, 103, 0.12);
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.26);
      --shadow-lg: 0 22px 50px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at top left, rgba(240, 141, 73, 0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(125, 196, 157, 0.12), transparent 22%),
        linear-gradient(180deg, var(--bg) 0%, color-mix(in srgb, var(--bg) 86%, #000 4%) 100%);
      color: var(--text);
      font-family: "Noto Sans KR", -apple-system, BlinkMacSystemFont, sans-serif;
      transition: background var(--transition), color var(--transition);
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }

    button, input, textarea, select { font: inherit; }

    #app { display: flex; flex-direction: column; min-height: 100dvh; }

    header {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: var(--header-h);
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 88%, transparent);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .header-left { display: flex; align-items: center; gap: 12px; }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 13px;
      background: linear-gradient(135deg, var(--primary) 0%, #f6be72 100%);
      box-shadow: 0 8px 18px var(--primary-glow);
      color: #fff;
      flex-shrink: 0;
    }

    .logo svg { width: 18px; height: 18px; }
    .header-title { font-size: 0.95rem; font-weight: 800; letter-spacing: -0.02em; }
    .header-date { margin-top: 2px; color: var(--text2); font-size: 0.72rem; }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface-strong);
      color: var(--text2);
      cursor: pointer;
      transition: transform var(--transition), color var(--transition), background var(--transition);
    }

    .icon-btn:hover { transform: translateY(-1px); background: var(--surface2); color: var(--text); }
    .icon-btn svg { width: 16px; height: 16px; }

    main {
      flex: 1;
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px 20px calc(var(--nav-h) + 28px);
    }

    .view { display: none; }
    .view.active { display: block; animation: fadeUp 0.22s ease both; }

    .grid-home {
      display: grid;
      grid-template-columns: 420px minmax(0, 1fr);
      gap: 18px;
    }

    .stack { display: flex; flex-direction: column; gap: 16px; }

    .card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .hero-card {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--primary) 18%, var(--surface-strong)) 0%, var(--surface) 100%);
    }

    .hero-card::after {
      content: "";
      position: absolute;
      inset: auto -70px -70px auto;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.18), transparent 62%);
      pointer-events: none;
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
      color: var(--text3);
      font-size: 0.66rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .section-label svg { width: 12px; height: 12px; }
    .hero-title { font-size: 1.32rem; font-weight: 800; line-height: 1.3; letter-spacing: -0.03em; }
    .hero-sub { margin-top: 8px; color: var(--text2); font-size: 0.9rem; line-height: 1.7; }

    .quick-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 16px;
    }

    .stat-chip {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: color-mix(in srgb, var(--surface-strong) 82%, transparent);
    }

    .stat-chip strong {
      display: block;
      font-size: 1rem;
      font-weight: 800;
    }

    .stat-chip span {
      display: block;
      margin-top: 3px;
      color: var(--text2);
      font-size: 0.74rem;
    }

    .date-block { margin-bottom: 16px; }

    .date-input,
    .mem-input,
    .search-input,
    .filter-select {
      width: 100%;
      border: 1.5px solid transparent;
      border-radius: var(--radius-sm);
      background: var(--bg2);
      color: var(--text);
      transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
    }

    .date-input,
    .search-input,
    .filter-select {
      padding: 12px 14px;
      font-size: 0.9rem;
    }

    .date-input::-webkit-calendar-picker-indicator { opacity: 0.35; cursor: pointer; }
    [data-theme="dark"] .date-input::-webkit-calendar-picker-indicator { filter: invert(1); }

    .date-input:hover,
    .mem-input:hover,
    .search-input:hover,
    .filter-select:hover { border-color: var(--primary-glow); }

    .date-input:focus,
    .mem-input:focus,
    .search-input:focus,
    .filter-select:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--surface-strong);
      box-shadow: 0 0 0 4px var(--primary-soft);
    }

    .fields { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }

    .item-field {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: color-mix(in srgb, var(--surface-strong) 86%, transparent);
    }

    .field-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .field-label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text2);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .field-num,
    .entry-n {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 0.66rem;
      font-weight: 800;
      flex-shrink: 0;
    }

    .mini-btn,
    .ghost-btn,
    .solid-btn,
    .random-btn {
      border: none;
      cursor: pointer;
      transition: transform var(--transition), background var(--transition), color var(--transition), box-shadow var(--transition);
    }

    .mini-btn {
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--danger-soft);
      color: var(--danger);
      font-size: 0.72rem;
      font-weight: 700;
    }

    .mini-btn:hover { transform: translateY(-1px); }
    .mini-btn[disabled] { visibility: hidden; }

    .mem-input {
      min-height: 74px;
      padding: 12px 14px;
      resize: vertical;
      font-size: 0.9rem;
      line-height: 1.7;
    }

    .mem-input::placeholder { color: var(--text3); }

    .action-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .ghost-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 11px 14px;
      border-radius: 14px;
      background: var(--surface2);
      color: var(--text2);
      font-size: 0.84rem;
      font-weight: 700;
    }

    .ghost-btn:hover { transform: translateY(-1px); background: var(--primary-soft); color: var(--primary); }

    .status-line {
      margin-top: -4px;
      margin-bottom: 16px;
      color: var(--text3);
      font-size: 0.74rem;
    }

    .emotion-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .emotion-chip {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface-strong);
      color: var(--text2);
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: background var(--transition), color var(--transition), border-color var(--transition), transform var(--transition);
    }

    .emotion-chip.active {
      background: var(--primary-soft);
      border-color: color-mix(in srgb, var(--primary) 42%, transparent);
      color: var(--primary);
    }

    .emotion-chip:hover { transform: translateY(-1px); }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .slider-row input[type="range"] {
      width: 100%;
      accent-color: var(--primary);
    }

    .slider-badge {
      min-width: 52px;
      padding: 8px 10px;
      border-radius: 12px;
      background: var(--accent-soft);
      color: var(--accent);
      text-align: center;
      font-size: 0.76rem;
      font-weight: 800;
    }

    .save-btn,
    .solid-btn,
    .random-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 14px;
      color: #fff;
      font-weight: 800;
    }

    .save-btn,
    .solid-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary) 0%, #f6be72 100%);
      box-shadow: 0 10px 24px var(--primary-glow);
    }

    .save-btn:hover:not(:disabled),
    .solid-btn:hover { transform: translateY(-1px); }
    .save-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .right-panel { display: flex; flex-direction: column; gap: 16px; }

    .entry-card {
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      animation: fadeUp 0.3s ease both;
    }

    .entry-card:hover { box-shadow: var(--shadow-lg); }

    .entry-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 15px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .entry-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .badge-today { background: var(--primary); color: #fff; }
    .badge-past { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
    .badge-emo { background: var(--accent-soft); color: var(--accent); }
    .entry-date-str { color: var(--text2); font-size: 0.8rem; font-weight: 600; }

    .del-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: var(--text3);
      cursor: pointer;
    }

    .del-btn:hover { background: var(--danger-soft); color: var(--danger); }

    .entry-body {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
    }

    .entry-row { display: flex; align-items: flex-start; gap: 11px; }
    .entry-text { flex: 1; font-size: 0.9rem; line-height: 1.72; }

    .entry-footer {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 16px 16px;
    }

    .tag-chip {
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--surface2);
      color: var(--text2);
      font-size: 0.74rem;
      font-weight: 700;
    }

    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 34px 20px;
      text-align: center;
    }

    .empty-ico {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 58px;
      height: 58px;
      border-radius: 20px;
      background: var(--primary-soft);
      color: var(--primary);
    }

    .empty-title { color: var(--text2); font-size: 0.95rem; font-weight: 700; }
    .empty-desc { color: var(--text3); font-size: 0.8rem; line-height: 1.65; }

    .explore-grid,
    .summary-grid,
    .settings-grid {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 18px;
    }

    .search-group { display: flex; flex-direction: column; gap: 12px; }
    .filter-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .search-results {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .result-card {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: color-mix(in srgb, var(--surface-strong) 88%, transparent);
    }

    .result-card h4 {
      margin-bottom: 6px;
      font-size: 0.94rem;
      font-weight: 800;
    }

    .result-card p {
      color: var(--text2);
      font-size: 0.85rem;
      line-height: 1.7;
    }

    .result-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    mark {
      padding: 0 2px;
      border-radius: 4px;
      background: rgba(246, 190, 114, 0.45);
      color: inherit;
    }

    .random-btn {
      width: 100%;
      padding: 12px 14px;
      background: linear-gradient(135deg, var(--accent) 0%, #9ad7b1 100%);
      box-shadow: 0 10px 22px rgba(125, 196, 157, 0.2);
    }

    .random-card {
      min-height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .summary-top {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .summary-metric {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: color-mix(in srgb, var(--surface-strong) 88%, transparent);
    }

    .summary-metric strong {
      display: block;
      margin-top: 6px;
      font-size: 1.15rem;
      font-weight: 800;
    }

    .summary-metric span { color: var(--text2); font-size: 0.78rem; }

    .summary-section {
      margin-top: 14px;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: color-mix(in srgb, var(--surface-strong) 86%, transparent);
    }

    .summary-section h4 {
      margin-bottom: 10px;
      font-size: 0.92rem;
      font-weight: 800;
    }

    .summary-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .summary-list .tag-chip { background: var(--primary-soft); color: var(--primary); }

    .emotion-bars {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .emotion-bar-row {
      display: grid;
      grid-template-columns: 74px 1fr 42px;
      gap: 10px;
      align-items: center;
      font-size: 0.8rem;
      color: var(--text2);
    }

    .emotion-bar-track {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--surface2);
    }

    .emotion-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent) 0%, #9ad7b1 100%);
    }

    .quote-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      color: var(--text2);
      font-size: 0.87rem;
      line-height: 1.7;
    }

    .quote-item {
      padding: 12px 14px;
      border-left: 3px solid var(--primary);
      border-radius: 0 14px 14px 0;
      background: color-mix(in srgb, var(--surface2) 74%, transparent);
    }

    .settings-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .file-input { display: none; }

    .danger-btn {
      background: linear-gradient(135deg, var(--danger) 0%, #f39a88 100%);
      box-shadow: 0 10px 24px rgba(217, 83, 79, 0.22);
    }

    .settings-note {
      color: var(--text2);
      font-size: 0.84rem;
      line-height: 1.7;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 120;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(15, 17, 21, 0.56);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .modal-backdrop.open { display: flex; }

    .modal-card {
      width: min(680px, 100%);
      max-height: min(80dvh, 760px);
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--surface);
      box-shadow: var(--shadow-lg);
      padding: 20px;
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .modal-title {
      font-size: 1rem;
      font-weight: 800;
    }

    .cal-card { padding: 20px; }
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .cal-month { font-size: 1rem; font-weight: 800; }

    .cal-arrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface-strong);
      color: var(--text2);
      cursor: pointer;
    }

    .cal-arrow:hover { background: var(--surface2); color: var(--text); }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
    .cal-hdr { padding: 6px 0; color: var(--text3); font-size: 0.67rem; font-weight: 800; text-align: center; }

    .cal-day {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: 1;
      border-radius: 12px;
      color: var(--text2);
      cursor: pointer;
      transition: background var(--transition), color var(--transition), transform var(--transition);
    }

    .cal-day:hover:not(.dim) { transform: translateY(-1px); background: var(--surface2); color: var(--text); }
    .cal-day.today { background: var(--primary); color: #fff; font-weight: 800; }
    .cal-day.has-entry::after {
      content: "";
      position: absolute;
      bottom: 5px;
      left: 50%;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
      transform: translateX(-50%);
    }

    .cal-day.dim { color: var(--text3); opacity: 0.32; cursor: default; }

    nav {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: var(--nav-h);
      padding: 0 16px;
      padding-bottom: env(safe-area-inset-bottom);
      border-top: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 90%, transparent);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .nav-btn {
      display: flex;
      flex: 1;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      max-width: 110px;
      padding: 10px 8px;
      border: none;
      border-radius: 16px;
      background: transparent;
      color: var(--text3);
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
    }

    .nav-btn.active { background: var(--primary-soft); color: var(--primary); }

    const toDateStr = (date) => {
      const year = date.getFullYear();

      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;

      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")

    const formatDateTime = (value) => {
      if (!value) return "저장 기록 없음";
      const date = new Date(value);
      return `${date.getMonth() + 1}월 ${date.getDate()}일 ${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;

    const migrateEntry = (date, entry) => {
      if (!entry) return null;
      if (Array.isArray(entry.items)) {
        return {
          id: entry.id || date,
          date,
          items: entry.items.filter(Boolean),
          emotions: Array.isArray(entry.emotions) ? entry.emotions.filter(Boolean) : [],
          intensity: entry.intensity || 3,
          createdAt: entry.createdAt || entry.updatedAt || new Date().toISOString(),
          updatedAt: entry.updatedAt || entry.createdAt || new Date().toISOString()
        };
      }

      const items = [entry.item1, entry.item2, entry.item3].filter(Boolean);
      return {
        id: date,
        date,
        items,
        emotions: Array.isArray(entry.emotions) ? entry.emotions.filter(Boolean) : [],
        intensity: entry.intensity || 3,
        createdAt: entry.createdAt || entry.updatedAt || new Date().toISOString(),
        updatedAt: entry.updatedAt || entry.createdAt || new Date().toISOString()
      };
    };

    const loadEntries = () => {
      const current = localStorage.getItem(ENTRY_KEY);
      const legacy = localStorage.getItem(LEGACY_ENTRY_KEY);
      const raw = current || legacy;
      if (!raw) return {};

      try {
        const parsed = JSON.parse(raw);
        const migrated = {};
        Object.entries(parsed).forEach(([date, entry]) => {
          const normalized = migrateEntry(date, entry);
          if (normalized) migrated[date] = normalized;
        });
        return migrated;
      } catch {
        return {};
      }
    };

    const loadDrafts = () => {
      try {
        return JSON.parse(localStorage.getItem(DRAFT_KEY) || "{}");
      } catch {
        return {};
      }
    };

    let firebaseModuleCache;
    let firebaseDbPromise;

    const loadFirebaseModules = async () => {
      if (firebaseModuleCache) return firebaseModuleCache;
      const [{ initializeApp, getApp, getApps }, { getFirestore, collection, getDocs, orderBy, query, doc, setDoc, deleteDoc }] = await Promise.all([
        import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"),
        import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js")
      ]);
      firebaseModuleCache = { initializeApp, getApp, getApps, getFirestore, collection, getDocs, orderBy, query, doc, setDoc, deleteDoc };
      return firebaseModuleCache;
    };

    const getFirebaseDb = async () => {
      if (firebaseDbPromise) return firebaseDbPromise;
      firebaseDbPromise = (async () => {
        const { initializeApp, getApp, getApps, getFirestore } = await loadFirebaseModules();
        const app = getApps().some((item) => item.name === "legacy-diary-import")
          ? getApp("legacy-diary-import")
          : initializeApp(FIREBASE_CONFIG, "legacy-diary-import");
        return getFirestore(app);
      })();
      return firebaseDbPromise;
    };

    const persistEntries = () => {
      localStorage.setItem(ENTRY_KEY, JSON.stringify(entries));
    };

    const persistDrafts = () => {
      localStorage.setItem(DRAFT_KEY, JSON.stringify(drafts));
    };

    const countStreak = () => {
      const dates = Object.keys(entries).sort((a, b) => b.localeCompare(a));
      if (!dates.length) return 0;
      let streak = 0;
      let cursor = new Date();
      while (true) {
        const key = toDateStr(cursor);
        if (entries[key]) {
          streak += 1;
          cursor.setDate(cursor.getDate() - 1);
        } else {
          break;
        }
      }
      return streak;
    };

    const entriesToArray = () => Object.values(entries).sort((a, b) => b.date.localeCompare(a.date));

    const getTopEmotion = (items) => {
      const counts = {};
      items.forEach((entry) => {
        (entry.emotions || []).forEach((emotion) => {
          counts[emotion] = (counts[emotion] || 0) + 1;
        });
      });
      const [emotion] = Object.entries(counts).sort((a, b) => b[1] - a[1])[0] || [];
      return emotion || "아직 없음";
    };

    const tokenize = (items) => {
      const counts = {};
      items.forEach((entry) => {
        entry.items.forEach((text) => {
          text
            .toLowerCase()
            .replace(/[^0-9a-zA-Z가-힣\s]/g, " ")
            .split(/\s+/)
            .filter((token) => token.length >= 2 && !STOP_WORDS.has(token))
            .forEach((token) => {
              counts[token] = (counts[token] || 0) + 1;
            });
        });
      });
      return counts;
    };

    const topKeywords = (items, limit = 6) =>
      Object.entries(tokenize(items))
        .sort((a, b) => b[1] - a[1])
        .slice(0, limit)
        .map(([word, count]) => ({ word, count }));

    const mergeEntryMaps = (remoteEntries, localEntries) => {
      const merged = { ...remoteEntries };
      Object.entries(localEntries).forEach(([date, localEntry]) => {
        const remoteEntry = merged[date];
        if (!remoteEntry) {
          merged[date] = localEntry;
          return;
        }

        const localUpdated = new Date(localEntry.updatedAt || localEntry.createdAt || 0).getTime();
        const remoteUpdated = new Date(remoteEntry.updatedAt || remoteEntry.createdAt || 0).getTime();
        merged[date] = localUpdated >= remoteUpdated ? localEntry : remoteEntry;
      });
      return merged;
    };

    const toFirebaseEntry = (entry) => ({
      date: entry.date,
      item1: entry.items[0] || "",
      item2: entry.items[1] || "",
      item3: entry.items[2] || "",
      items: entry.items,
      emotions: entry.emotions || [],
      intensity: entry.intensity || 3,
      created_at: entry.createdAt,
      updated_at: entry.updatedAt
    });

    let entries = loadEntries();
    let drafts = loadDrafts();
    let currentDate = toDateStr(new Date());
    let currentView = "home";
    let calendarYear = new Date().getFullYear();
    let calendarMonth = new Date().getMonth();
    let draftItems = ["", "", ""];
    let selectedEmotions = [];
    let emotionIntensity = 3;

    const dateInput = document.getElementById("date-input");
    const fieldsEl = document.getElementById("fields");
    const emotionGridEl = document.getElementById("emotion-grid");
    const intensityEl = document.getElementById("emotion-intensity");
    const intensityLabelEl = document.getElementById("emotion-intensity-label");
    const saveStatusEl = document.getElementById("save-status");
    const saveBtn = document.getElementById("save-btn");
    const saveLabel = document.getElementById("save-label");
    const quickStatsEl = document.getElementById("quick-stats");
    const todayPanelEl = document.getElementById("today-panel");
    const anniversaryPanelEl = document.getElementById("anniversary-panel");
    const randomPanelEl = document.getElementById("random-panel");
    const searchResultsEl = document.getElementById("search-results");
    const searchQueryEl = document.getElementById("search-query");
    const searchFromEl = document.getElementById("search-from");
    const searchToEl = document.getElementById("search-to");
    const searchEmotionEl = document.getElementById("search-emotion");
    const summaryRangeEl = document.getElementById("summary-range");
    const summaryFromEl = document.getElementById("summary-from");
    const summaryToEl = document.getElementById("summary-to");
    const summaryTopEl = document.getElementById("summary-top");
    const summaryDetailEl = document.getElementById("summary-detail");
    const settingsStatusEl = document.getElementById("settings-status");
    const entryModalEl = document.getElementById("entry-modal");
    const modalTitleEl = document.getElementById("modal-title");
    const modalBodyEl = document.getElementById("modal-body");

    const toast = (message) => {
      const el = document.getElementById("toast");
      el.textContent = message;
      el.classList.add("show");
      window.clearTimeout(toast.timer);
      toast.timer = window.setTimeout(() => el.classList.remove("show"), 2500);
    };

    const setHeaderDate = () => {
      const now = new Date();
      const days = ["일", "월", "화", "수", "목", "금", "토"];
      document.getElementById("hdr-date").textContent =
        `${now.getMonth() + 1}월 ${now.getDate()}일 ${days[now.getDay()]}요일`;
    };

    const setThemeIcon = (theme) => {
      document.getElementById("ico-sun").style.display = theme === "dark" ? "block" : "none";
      document.getElementById("ico-moon").style.display = theme === "light" ? "block" : "none";
    };

    const applyTheme = (theme) => {
      document.documentElement.setAttribute("data-theme", theme);
      localStorage.setItem(THEME_KEY, theme);
      setThemeIcon(theme);
    };

    const setSaveStatus = (text) => {
      saveStatusEl.textContent = text;
    };

    const saveDraft = () => {
      const items = draftItems.map((item) => item.trim()).filter(Boolean);
      const hasContent = items.length || selectedEmotions.length;
      if (!hasContent) {
        delete drafts[currentDate];
        persistDrafts();
        return;
      }

      drafts[currentDate] = {
        date: currentDate,
        items,
        emotions: [...selectedEmotions],
        intensity: emotionIntensity,
        updatedAt: new Date().toISOString()
      };
      persistDrafts();
    };

    const syncEmotionIntensityLabel = () => {
      intensityLabelEl.textContent = `${emotionIntensity} / 5`;
      intensityLabelEl.title = getIntensityLabel(emotionIntensity);
    };

    const ensureMinFields = () => {
      if (!draftItems.length) draftItems = [""];
    };

    const renderFields = () => {
      ensureMinFields();
      fieldsEl.innerHTML = draftItems.map((value, index) => `
        <div class="item-field">
          <div class="field-head">
            <div class="field-label"><span class="field-num">${index + 1}</span> ${index + 1}번째 기억</div>
            <button class="mini-btn" type="button" data-remove-index="${index}" ${draftItems.length === 1 ? "disabled" : ""}>삭제</button>
          </div>
          <textarea class="mem-input" data-item-index="${index}" rows="3" placeholder="${FIELD_PLACEHOLDERS[index] || "오늘 떠오른 기억을 적어보세요"}">${value}</textarea>
        </div>
      `).join("");

      fieldsEl.querySelectorAll("[data-item-index]").forEach((el) => {
        el.addEventListener("input", (event) => {
          draftItems[Number(event.target.dataset.itemIndex)] = event.target.value;
          saveDraft();
          setSaveStatus("작성 중입니다. 저장해 주세요.");
        });
      });

      fieldsEl.querySelectorAll("[data-remove-index]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const index = Number(btn.dataset.removeIndex);
          if (draftItems.length === 1) return;
          draftItems.splice(index, 1);
          renderFields();
          saveDraft();
          setSaveStatus("항목 구성이 변경되었습니다.");
        });
      });
    };

    const renderEmotionGrid = () => {
      emotionGridEl.innerHTML = EMOTIONS.map((emotion) => `
        <button class="emotion-chip ${selectedEmotions.includes(emotion) ? "active" : ""}" data-emotion="${emotion}" type="button">${emotion}</button>
      `).join("");

      emotionGridEl.querySelectorAll("[data-emotion]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const emotion = btn.dataset.emotion;
          if (selectedEmotions.includes(emotion)) {
            selectedEmotions = selectedEmotions.filter((item) => item !== emotion);
          } else {
            selectedEmotions = [...selectedEmotions, emotion];
          }
          renderEmotionGrid();
          saveDraft();
          setSaveStatus("감정 선택이 변경되었습니다.");
        });
      });
    };

    const fillForm = (entry) => {
      const draft = drafts[currentDate];
      const source = draft || entry;
      draftItems = source?.items?.length ? [...source.items] : ["", "", ""];
      selectedEmotions = source?.emotions ? [...source.emotions] : [];
      emotionIntensity = source?.intensity || 3;
      intensityEl.value = String(emotionIntensity);
      renderFields();
      renderEmotionGrid();
      syncEmotionIntensityLabel();
      if (draft && !entry) {
        setSaveStatus(`임시 초안 복원됨: ${formatDateTime(draft.updatedAt)}`);
      } else if (draft && entry) {
        setSaveStatus(`임시 초안 있음: ${formatDateTime(draft.updatedAt)}`);
      } else {
        setSaveStatus(entry?.updatedAt ? `마지막 저장: ${formatDateTime(entry.updatedAt)}` : "아직 저장되지 않았습니다.");
      }
    };

    const renderQuickStats = () => {
      const list = entriesToArray();
      quickStatsEl.innerHTML = `
        <div class="stat-chip">
          <strong>${list.length}</strong>
          <span>전체 기록 수</span>
        </div>
        <div class="stat-chip">
          <strong>${countStreak()}일</strong>
          <span>현재 연속 기록</span>
        </div>
        <div class="stat-chip">
          <strong>${getTopEmotion(list)}</strong>
          <span>가장 자주 느낀 감정</span>
        </div>
      `;
    };

    const renderEntryCard = (entry, options = {}) => {
      const { titleBadge = "오늘", badgeClass = "badge-today", deletable = false, subtitle = formatKoDate(entry.date) } = options;
      return `
        <div class="entry-card">
          <div class="entry-header">
            <div>
              <div class="entry-meta">
                <span class="badge ${badgeClass}">${titleBadge}</span>
                <span class="entry-date-str">${subtitle}</span>
                ${(entry.emotions || []).map((emotion) => `<span class="badge badge-emo">${emotion}</span>`).join("")}
              </div>
            </div>
            ${deletable ? `
              <button class="del-btn" type="button" data-delete="${entry.date}" title="삭제">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6"></polyline>
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
                </svg>
              </button>
            ` : ""}
          </div>
          <div class="entry-body">
            ${entry.items.map((text, index) => `
              <div class="entry-row">
                <span class="entry-n">${index + 1}</span>
                <p class="entry-text">${escapeHtml(text)}</p>
              </div>
            `).join("")}
          </div>
          <div class="entry-footer">
            <span class="tag-chip">감정 강도 ${entry.intensity || 3}/5</span>
            <span class="tag-chip">업데이트 ${formatDateTime(entry.updatedAt)}</span>
          </div>
        </div>
      `;
    };

    const openEntryModal = (entry, title = "기록 상세") => {
      modalTitleEl.textContent = title;
      modalBodyEl.innerHTML = renderEntryCard(entry, {
        titleBadge: "기록 상세",
        badgeClass: "badge-past",
        subtitle: formatKoDate(entry.date)
      });
      entryModalEl.classList.add("open");
    };

    const closeEntryModal = () => {
      entryModalEl.classList.remove("open");
    };

    const bindTodayDelete = () => {
      todayPanelEl.querySelectorAll("[data-delete]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          if (!window.confirm("이 일기를 삭제하시겠습니까?")) return;
          const date = btn.dataset.delete;
          delete entries[date];
          persistEntries();
          delete drafts[date];
          persistDrafts();
          try {
            await deleteEntryFromFirebase(date);
          } catch (error) {
            console.error(error);
            toast("로컬에서는 삭제했지만 Firebase 삭제는 실패했어요");
          }
          fillForm(null);
          renderAll();
          toast("삭제되었어요");
        });
      });
    };

    const getSameDayPastEntries = (dateStr) => {
      const [year, month, day] = dateStr.split("-").map(Number);
      return entriesToArray().filter((entry) => {
        const [entryYear, entryMonth, entryDay] = entry.date.split("-").map(Number);
        return entryYear < year && entryMonth === month && entryDay === day;
      });
    };

    const renderTodayPanels = () => {
      const todayEntry = entries[currentDate];
      const pastEntries = getSameDayPastEntries(currentDate);

      if (todayEntry) {
        todayPanelEl.innerHTML = `
          <div class="section-label">오늘 기록</div>
          ${renderEntryCard(todayEntry, { deletable: true, titleBadge: "오늘", badgeClass: "badge-today" })}
        `;
      } else {
        todayPanelEl.innerHTML = `
          <div class="section-label">오늘 기록</div>
          <div class="empty">
            <div class="empty-ico">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M12 20h9"></path>
                <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"></path>
              </svg>
            </div>
            <div class="empty-title">오늘 기록이 아직 없습니다</div>
            <div class="empty-desc">기억 한 줄만 적어도 저장할 수 있습니다.</div>
          </div>
        `;
      }

      if (pastEntries.length) {
        anniversaryPanelEl.innerHTML = `
          <div class="section-label">같은 날의 기록</div>
          <div class="stack">
            ${pastEntries.slice(0, 3).map((entry) => {
              const ago = new Date(currentDate).getFullYear() - new Date(entry.date).getFullYear();
              return renderEntryCard(entry, {
                titleBadge: `${ago}년 전 오늘`,
                badgeClass: "badge-past"
              });
            }).join("")}
          </div>
        `;
      } else {
        anniversaryPanelEl.innerHTML = `
          <div class="section-label">같은 날의 기록</div>
          <div class="empty">
            <div class="empty-ico">⏳</div>
            <div class="empty-title">아직 같은 날의 회고가 없습니다</div>
            <div class="empty-desc">꾸준히 기록하면 시간이 지난 뒤 같은 날짜를 다시 만날 수 있습니다.</div>
          </div>
        `;
      }

      bindTodayDelete();
    };

    const highlightText = (text, query) => {
      if (!query) return escapeHtml(text);
      const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      return escapeHtml(text).replace(new RegExp(escapedQuery, "gi"), (match) => `<mark>${match}</mark>`);
    };

    const getFilteredEntries = () => {
      const query = searchQueryEl.value.trim().toLowerCase();
      const from = searchFromEl.value;
      const to = searchToEl.value;
      const emotion = searchEmotionEl.value;

      return entriesToArray().filter((entry) => {
        if (from && entry.date < from) return false;
        if (to && entry.date > to) return false;
        if (emotion && !(entry.emotions || []).includes(emotion)) return false;
        if (!query) return true;
        return entry.items.some((item) => item.toLowerCase().includes(query));
      });
    };

    const renderSearchResults = () => {
      const query = searchQueryEl.value.trim();
      const results = getFilteredEntries();

      if (!results.length) {
        searchResultsEl.innerHTML = `
          <div class="empty">
            <div class="empty-ico">🔎</div>
            <div class="empty-title">조건에 맞는 기록이 없습니다</div>
            <div class="empty-desc">검색어를 줄이거나 날짜/감정 필터를 조정해보세요.</div>
          </div>
        `;
        return;
      }

      searchResultsEl.innerHTML = results.map((entry) => `
        <div class="result-card">
          <h4>${formatKoDate(entry.date)}</h4>
          <p>${entry.items.map((item) => highlightText(item, query)).join("<br><br>")}</p>
          <div class="entry-footer" style="padding:12px 0 0">
            ${(entry.emotions || []).map((emotion) => `<span class="tag-chip">${emotion}</span>`).join("")}
            <span class="tag-chip">강도 ${entry.intensity}/5</span>
          </div>
          <div class="result-actions">
            <button class="ghost-btn" type="button" data-open-entry="${entry.date}">상세 보기</button>
          </div>
        </div>
      `).join("");

      searchResultsEl.querySelectorAll("[data-open-entry]").forEach((button) => {
        button.addEventListener("click", () => {
          const entry = entries[button.dataset.openEntry];
          if (entry) openEntryModal(entry, formatKoDate(entry.date));
        });
      });
    };

    const renderRandomEntry = (entry) => {
      if (!entry) {
        randomPanelEl.innerHTML = `
          <div class="section-label">랜덤 회고</div>
          <div class="empty">
            <div class="empty-ico">🎲</div>
            <div class="empty-title">아직 랜덤으로 볼 기록이 없습니다</div>
            <div class="empty-desc">첫 기록을 남기면 무작위 회고가 가능해집니다.</div>
          </div>
        `;
        return;
      }

      randomPanelEl.innerHTML = `
        <div class="section-label">랜덤 회고</div>
        ${renderEntryCard(entry, {
          titleBadge: "랜덤 기록",
          badgeClass: "badge-past"
        })}
        <div class="result-actions">
          <button class="ghost-btn" id="random-detail-btn" type="button">원문 자세히 보기</button>
        </div>
      `;

      document.getElementById("random-detail-btn").addEventListener("click", () => {
        openEntryModal(entry, `랜덤 회고 · ${formatKoDate(entry.date)}`);
      });
    };

    const pickRandomEntry = () => {
      const candidates = getFilteredEntries();
      if (!candidates.length) {
        renderRandomEntry(null);
        toast("랜덤으로 뽑을 기록이 없습니다");
        return;
      }
      const entry = candidates[Math.floor(Math.random() * candidates.length)];
      renderRandomEntry(entry);
    };

    const getSummaryEntries = () => {
      const range = summaryRangeEl.value;
      const today = new Date();
      let from = summaryFromEl.value;
      let to = summaryToEl.value;

      if (range !== "custom") {
        const start = new Date(today);
        start.setDate(today.getDate() - (Number(range) - 1));
        from = toDateStr(start);
        to = toDateStr(today);
        summaryFromEl.value = from;
        summaryToEl.value = to;
      }

      return entriesToArray().filter((entry) => {
        if (from && entry.date < from) return false;
        if (to && entry.date > to) return false;
        return true;
      });
    };

    const renderSummary = () => {
      const list = getSummaryEntries();
      const topEmotion = getTopEmotion(list);
      const keywords = topKeywords(list);
      const emotionCounts = {};
      list.forEach((entry) => {
        (entry.emotions || []).forEach((emotion) => {
          emotionCounts[emotion] = (emotionCounts[emotion] || 0) + 1;
        });
      });
      const maxEmotionCount = Math.max(...Object.values(emotionCounts), 1);
      const totalItems = list.reduce((sum, entry) => sum + entry.items.length, 0);
      const averageIntensity = list.length
        ? (list.reduce((sum, entry) => sum + (entry.intensity || 0), 0) / list.length).toFixed(1)
        : "0.0";
      const representativeQuotes = list
        .flatMap((entry) => entry.items.map((text) => ({ date: entry.date, text })))
        .slice(0, 3);

      summaryTopEl.innerHTML = `
        <div class="summary-metric">
          <span>기록 수</span>
          <strong>${list.length}</strong>
        </div>
        <div class="summary-metric">
          <span>총 기억 항목</span>
          <strong>${totalItems}</strong>
        </div>
        <div class="summary-metric">
          <span>평균 감정 강도</span>
          <strong>${averageIntensity}</strong>
        </div>
      `;

      summaryDetailEl.innerHTML = `
        <div class="summary-section">
          <h4>가장 많이 등장한 감정</h4>
          <div class="summary-list">
            <span class="tag-chip">${topEmotion}</span>
            ${list.length ? `<span class="tag-chip">분석 기간 ${summaryFromEl.value} ~ ${summaryToEl.value}</span>` : ""}
          </div>
        </div>
        <div class="summary-section">
          <h4>자주 나온 단어</h4>
          <div class="summary-list">
            ${keywords.length ? keywords.map((item) => `<span class="tag-chip">${item.word} ${item.count}회</span>`).join("") : '<span class="tag-chip">아직 분석할 단어가 없습니다</span>'}
          </div>
        </div>
        <div class="summary-section">
          <h4>감정 분포</h4>
          <div class="emotion-bars">
            ${Object.keys(emotionCounts).length ? Object.entries(emotionCounts).sort((a, b) => b[1] - a[1]).map(([emotion, count]) => `
              <div class="emotion-bar-row">
                <span>${emotion}</span>
                <div class="emotion-bar-track"><div class="emotion-bar-fill" style="width:${(count / maxEmotionCount) * 100}%"></div></div>
                <strong>${count}</strong>
              </div>
            `).join("") : '<div class="quote-item">아직 감정 데이터가 부족합니다.</div>'}
          </div>
        </div>
        <div class="summary-section">
          <h4>대표 문장</h4>
          <div class="quote-list">
            ${representativeQuotes.length ? representativeQuotes.map((item) => `<div class="quote-item">${escapeHtml(item.text)}<br><small>${formatKoDate(item.date)}</small></div>`).join("") : '<div class="quote-item">선택한 기간의 기록이 없습니다.</div>'}
          </div>
        </div>
      `;
    };

    const renderSettingsStatus = () => {
      const entryCount = Object.keys(entries).length;
      const draftCount = Object.keys(drafts).length;
      const latestSaved = entriesToArray()[0]?.updatedAt;
      const latestDraft = Object.values(drafts).sort((a, b) => (b.updatedAt || "").localeCompare(a.updatedAt || ""))[0]?.updatedAt;
      const importedFirebase = localStorage.getItem(FIREBASE_IMPORT_KEY) === "done";

      settingsStatusEl.innerHTML = `
        <div class="quote-item">저장된 기록 수: ${entryCount}개</div>
        <div class="quote-item">임시 초안 수: ${draftCount}개</div>
        <div class="quote-item">마지막 저장 기록: ${latestSaved ? formatDateTime(latestSaved) : "없음"}</div>
        <div class="quote-item">마지막 임시 초안: ${latestDraft ? formatDateTime(latestDraft) : "없음"}</div>
        <div class="quote-item">Firebase 가져오기 상태: ${importedFirebase ? "완료" : "아직 안 함"}</div>
      `;
    };

    const importLegacyFirebaseEntries = async ({ silent = false } = {}) => {
      try {
        if (!silent) setSaveStatus("기존 Firebase 데이터를 가져오는 중입니다...");
        const { collection, getDocs, orderBy, query } = await loadFirebaseModules();
        const db = await getFirebaseDb();
        const snapshot = await getDocs(query(collection(db, FIREBASE_COLLECTION), orderBy("date")));
        const importedEntries = {};

        snapshot.forEach((docSnap) => {
          const normalized = migrateEntry(docSnap.id, docSnap.data());
          if (normalized) importedEntries[docSnap.id] = normalized;
        });

        entries = mergeEntryMaps(importedEntries, entries);
        persistEntries();
        localStorage.setItem(FIREBASE_IMPORT_KEY, "done");
        fillForm(entries[currentDate] || null);
        renderAll();
        if (!silent) toast(`${Object.keys(importedEntries).length}개의 Firebase 기록을 가져왔어요`);
      } catch (error) {
        console.error(error);
        if (!silent) {
          toast("Firebase 데이터를 가져오지 못했어요");
          setSaveStatus("Firebase 가져오기에 실패했습니다.");
        }
      }
    };

    const syncEntryToFirebase = async (entry) => {
      const { doc, setDoc } = await loadFirebaseModules();
      const db = await getFirebaseDb();
      await setDoc(doc(db, FIREBASE_COLLECTION, entry.date), toFirebaseEntry(entry));
    };

    const deleteEntryFromFirebase = async (date) => {
      const { doc, deleteDoc } = await loadFirebaseModules();
      const db = await getFirebaseDb();
      await deleteDoc(doc(db, FIREBASE_COLLECTION, date));
    };

    const renderCalendar = () => {
      document.getElementById("cal-label").textContent = `${calendarYear}년 ${calendarMonth + 1}월`;
      const firstDay = new Date(calendarYear, calendarMonth, 1).getDay();
      const totalDays = new Date(calendarYear, calendarMonth + 1, 0).getDate();
      const prevTotal = new Date(calendarYear, calendarMonth, 0).getDate();
      const today = toDateStr(new Date());
      const headers = ["일", "월", "화", "수", "목", "금", "토"];
      const daysWithEntries = new Set(
        Object.keys(entries)
          .filter((date) => {
            const [year, month] = date.split("-").map(Number);
            return year === calendarYear && month === calendarMonth + 1;
          })
          .map((date) => Number(date.split("-")[2]))
      );

      let html = headers.map((day) => `<div class="cal-hdr">${day}</div>`).join("");

      for (let i = firstDay - 1; i >= 0; i -= 1) {
        html += `<div class="cal-day dim">${prevTotal - i}</div>`;
      }

      for (let day = 1; day <= totalDays; day += 1) {
        const date = `${calendarYear}-${String(calendarMonth + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
        const classes = ["cal-day", date === today ? "today" : "", daysWithEntries.has(day) ? "has-entry" : ""].filter(Boolean).join(" ");
        html += `<button class="${classes}" type="button" data-cal-date="${date}">${day}</button>`;
      }

      const remainder = (firstDay + totalDays) % 7;
      const fill = remainder === 0 ? 0 : 7 - remainder;
      for (let day = 1; day <= fill; day += 1) {
        html += `<div class="cal-day dim">${day}</div>`;
      }

      const grid = document.getElementById("cal-grid");
      grid.innerHTML = html;
      grid.querySelectorAll("[data-cal-date]").forEach((btn) => {
        btn.addEventListener("click", () => {
          currentDate = btn.dataset.calDate;
          dateInput.value = currentDate;
          fillForm(entries[currentDate] || null);
          switchView("home");
        });
      });
    };

    const renderEmotionFilterOptions = () => {
      searchEmotionEl.innerHTML = `<option value="">감정 전체</option>${EMOTIONS.map((emotion) => `<option value="${emotion}">${emotion}</option>`).join("")}`;
    };

    const renderAll = () => {
      renderQuickStats();
      renderTodayPanels();
      renderSearchResults();
      renderRandomEntry(entriesToArray()[0] || null);
      renderCalendar();
      renderSummary();
      renderSettingsStatus();
    };

    const switchView = (view) => {
      currentView = view;
      document.querySelectorAll(".view").forEach((section) => {
        section.classList.toggle("active", section.id === `view-${view}`);
      });
      document.querySelectorAll(".nav-btn").forEach((button) => {
        button.classList.toggle("active", button.dataset.view === view);
      });
      if (view === "calendar") renderCalendar();
      if (view === "explore") renderSearchResults();
      if (view === "summary") renderSummary();
      if (view === "settings") renderSettingsStatus();
    };

    dateInput.value = currentDate;
    dateInput.max = toDateStr(new Date());
    dateInput.addEventListener("change", () => {
      currentDate = dateInput.value;
      fillForm(entries[currentDate] || null);
      renderTodayPanels();
    });

    document.getElementById("add-item-btn").addEventListener("click", () => {
      draftItems.push("");
      renderFields();
      saveDraft();
      setSaveStatus("새 항목이 추가되었습니다.");
    });

    intensityEl.addEventListener("input", (event) => {
      emotionIntensity = Number(event.target.value);
      syncEmotionIntensityLabel();
      saveDraft();
      setSaveStatus("감정 강도가 변경되었습니다.");
    });

    saveBtn.addEventListener("click", () => {
      const items = draftItems.map((item) => item.trim()).filter(Boolean);
      if (!items.length) {
        toast("최소 하나의 기억을 입력해주세요");
        return;
      }

      saveBtn.disabled = true;
      saveLabel.innerHTML = '<span class="spin"></span>';

      window.setTimeout(async () => {
        const existing = entries[currentDate];
        const nextEntry = {
          id: currentDate,
          date: currentDate,
          items,
          emotions: [...selectedEmotions],
          intensity: emotionIntensity,
          createdAt: existing?.createdAt || new Date().toISOString(),
          updatedAt: new Date().toISOString()
        };
        entries[currentDate] = nextEntry;
        persistEntries();
        delete drafts[currentDate];
        persistDrafts();
        try {
          await syncEntryToFirebase(nextEntry);
          localStorage.setItem(FIREBASE_IMPORT_KEY, "done");
          toast("일기가 저장되었어요");
        } catch (error) {
          console.error(error);
          toast("로컬에는 저장됐지만 Firebase 동기화는 실패했어요");
        } finally {
          fillForm(entries[currentDate]);
          renderAll();
          saveBtn.disabled = false;
          saveLabel.textContent = "일기 저장하기";
        }
      }, 180);
    });

    document.getElementById("theme-btn").addEventListener("click", () => {
      const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
      applyTheme(next);
    });

    document.querySelectorAll(".nav-btn").forEach((button) => {
      button.addEventListener("click", () => switchView(button.dataset.view));
    });

    document.getElementById("random-entry-btn").addEventListener("click", pickRandomEntry);

    [searchQueryEl, searchFromEl, searchToEl, searchEmotionEl].forEach((input) => {
      input.addEventListener("input", renderSearchResults);
      input.addEventListener("change", renderSearchResults);
    });

    summaryRangeEl.addEventListener("change", () => {
      const isCustom = summaryRangeEl.value === "custom";
      summaryFromEl.disabled = !isCustom;
      summaryToEl.disabled = !isCustom;
      renderSummary();
    });

    [summaryFromEl, summaryToEl].forEach((input) => {
      input.addEventListener("change", () => {
        if (summaryRangeEl.value === "custom") renderSummary();
      });
    });

    document.getElementById("summary-refresh").addEventListener("click", renderSummary);

    document.getElementById("import-firebase-btn").addEventListener("click", async () => {
      await importLegacyFirebaseEntries();
    });

    document.getElementById("export-json-btn").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify({ entries, drafts, exportedAt: new Date().toISOString() }, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = `diary-backup-${toDateStr(new Date())}.json`;
      anchor.click();
      URL.revokeObjectURL(url);
      toast("백업 파일을 내보냈어요");
    });

    document.getElementById("export-csv-btn").addEventListener("click", () => {
      const rows = [["date", "items", "emotions", "intensity", "createdAt", "updatedAt"]];
      entriesToArray().forEach((entry) => {
        rows.push([
          entry.date,
          entry.items.join(" | "),
          (entry.emotions || []).join(" | "),
          String(entry.intensity || 3),
          entry.createdAt || "",
          entry.updatedAt || ""
        ]);
      });
      const csv = rows.map((row) => row.map((cell) => `"${String(cell).replace(/"/g, "\"\"")}"`).join(",")).join("\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = `diary-backup-${toDateStr(new Date())}.csv`;
      anchor.click();
      URL.revokeObjectURL(url);
      toast("CSV 파일을 내보냈어요");
    });

    document.getElementById("import-json-btn").addEventListener("click", () => {
      document.getElementById("import-json-file").click();
    });

    document.getElementById("import-json-file").addEventListener("change", async (event) => {
      const [file] = event.target.files || [];
      if (!file) return;

      try {
        const text = await file.text();
        const parsed = JSON.parse(text);
        const importedEntries = {};
        Object.entries(parsed.entries || {}).forEach(([date, entry]) => {
          const normalized = migrateEntry(date, entry);
          if (normalized) importedEntries[date] = normalized;
        });
        entries = importedEntries;
        drafts = typeof parsed.drafts === "object" && parsed.drafts ? parsed.drafts : {};
        persistEntries();
        persistDrafts();
        fillForm(entries[currentDate] || null);
        renderAll();
        toast("백업을 가져왔어요");
      } catch {
        toast("백업 파일을 읽지 못했어요");
      } finally {
        event.target.value = "";
      }
    });

    document.getElementById("clear-data-btn").addEventListener("click", () => {
      if (!window.confirm("저장된 기록과 임시 초안을 모두 삭제할까요?")) return;
      entries = {};
      drafts = {};
      localStorage.removeItem(ENTRY_KEY);
      localStorage.removeItem(DRAFT_KEY);
      fillForm(null);
      renderAll();
      toast("로컬 데이터를 초기화했어요");
    });

    document.getElementById("modal-close-btn").addEventListener("click", closeEntryModal);
    entryModalEl.addEventListener("click", (event) => {
      if (event.target === entryModalEl) closeEntryModal();
    });

    document.getElementById("cal-prev").addEventListener("click", () => {
      calendarMonth -= 1;
      if (calendarMonth < 0) {
        calendarMonth = 11;
        calendarYear -= 1;
      }
      renderCalendar();
    });

    document.getElementById("cal-next").addEventListener("click", () => {
      calendarMonth += 1;
      if (calendarMonth > 11) {
        calendarMonth = 0;
        calendarYear += 1;
      }
      renderCalendar();
    });

    setHeaderDate();
    renderEmotionFilterOptions();
    applyTheme(localStorage.getItem(THEME_KEY) || "dark");
    fillForm(entries[currentDate] || null);
    summaryFromEl.disabled = true;
    summaryToEl.disabled = true;
    renderAll();

    importLegacyFirebaseEntries({ silent: true });
  </script>
</body>
</html>
